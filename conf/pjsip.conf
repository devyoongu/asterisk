[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[1001]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=auth1001
aors=1001

[auth1001]
type=auth
auth_type=userpass
username=1001
password=secret1001

[1001]
type=aor
max_contacts=1
remove_existing=yes

[1002]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=auth1002
aors=1002

[auth1002]
type=auth
auth_type=userpass
username=1002
password=secret1002

[1002]
type=aor
max_contacts=1
remove_existing=yes

; ── AI 콜봇 내선 2001 ──────────────────────────────────────
[2001]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw
auth=auth2001
aors=2001
; RTP를 항상 Asterisk가 중계 (콜봇이 다른 서브넷/VPN에 있으므로 direct media 불가)
direct_media=no
; force_rport/rewrite_contact: SIP Contact 주소 보정 (NAT/VPN 환경)
force_rport=yes
rewrite_contact=yes
; rtp_symmetric=no (기본값 유지): pyVoIP는 sin/sout 소켓을 분리해서 사용하므로
; rtp_symmetric=yes 시 sout의 임의 포트로 응답 → sin(16027)에 미도달

[auth2001]
type=auth
auth_type=userpass
username=2001
password=secret2001

[2001]
type=aor
max_contacts=1
remove_existing=yes