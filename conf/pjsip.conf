[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[1001]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=auth1001
aors=1001

[auth1001]
type=auth
auth_type=userpass
username=1001
password=secret1001

[1001]
type=aor
max_contacts=1
remove_existing=yes

[1002]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw,g722
auth=auth1002
aors=1002

[auth1002]
type=auth
auth_type=userpass
username=1002
password=secret1002

[1002]
type=aor
max_contacts=1
remove_existing=yes

; ── AI 콜봇 내선 2001 ──────────────────────────────────────
[2001]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw
auth=auth2001
aors=2001
; RTP를 항상 Asterisk가 중계 (콜봇이 다른 서브넷/VPN에 있으므로 direct media 불가)
direct_media=no
; NAT 환경 대응: 수신된 소스 주소/포트로 RTP 전송
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth2001]
type=auth
auth_type=userpass
username=2001
password=secret2001

[2001]
type=aor
max_contacts=1
remove_existing=yes